<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstrortsA - 笔记</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <div class="logo">AstrortsA</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="resume.html">简历</a>
      <a href="study.html">学习</a>
      <a href="research.html">科研</a>
      <a href="notes.html" class="active">笔记</a>
      <a href="share.html">分享</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title" style="font-size: 2.5rem; margin-bottom: 2rem;">每日笔记</h1>

    <!-- 仅自己可见的添加笔记表单 -->
    <div class="card" id="note-form-card" style="display: none;">
      <h2>添加新笔记</h2>
      <form id="note-form">
        <div class="form-group">
          <label>笔记内容：</label>
          <textarea id="note-content" rows="3" placeholder="写下今天的学习感悟、科研思考..." required></textarea>
        </div>
        <button type="submit">添加笔记</button>
      </form>
    </div>

    <!-- 笔记列表 -->
    <div class="card">
      <h2>笔记列表</h2>
      <ul class="item-list" id="notes-list">
        <li>加载中...</li>
      </ul>
    </div>
  </div>

  <footer>
    <p>© 2025 AstrortsA. 基于 GitHub Pages 搭建</p>
  </footer>

  <script>
    // 配置信息（你只需要改这3个地方！）
    const GITHUB_USER = "AstrortsA";
    const GITHUB_REPO = "AstrortsA.github.io";
    // 把你生成的Token填在这里（仅本地有效，不会泄露给访问者）
    const GITHUB_TOKEN = "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";

    const notesListEl = document.getElementById("notes-list");
    const noteFormEl = document.getElementById("note-form");
    const noteFormCardEl = document.getElementById("note-form-card");

    // 检查是否是自己（本地有Token就显示表单，否则隐藏）
    if (GITHUB_TOKEN && GITHUB_TOKEN !== "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") {
      noteFormCardEl.style.display = "block";
    }

    // 获取笔记列表（从GitHub Issues拉取）
    async function fetchNotes() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?state=open&labels=note&sort=created&direction=desc`, {
          headers: GITHUB_TOKEN ? { Authorization: `token ${GITHUB_TOKEN}` } : {}
        });
        const notes = await response.json();

        if (notes.length === 0) {
          notesListEl.innerHTML = "<li>暂无笔记，快来添加第一条吧~</li>";
          return;
        }

        notesListEl.innerHTML = "";
        notes.forEach(note => {
          const li = document.createElement("li");
          li.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <div>
                <strong>${new Date(note.created_at).toLocaleDateString('zh-CN')}</strong>
                <p style="margin-top: 0.5rem;">${note.body}</p>
              </div>
              ${GITHUB_TOKEN ? `<button class="btn-delete" data-id="${note.number}" style="background: #e74c3c; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer;">删除</button>` : ""}
            </div>
          `;
          notesListEl.appendChild(li);
        });

        // 绑定删除事件
        document.querySelectorAll(".btn-delete").forEach(btn => {
          btn.addEventListener("click", async () => {
            if (confirm("确定要删除这条笔记吗？")) {
              const issueNumber = btn.dataset.id;
              await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues/${issueNumber}`, {
                method: "PATCH",
                headers: {
                  Authorization: `token ${GITHUB_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ state: "closed" })
              });
              fetchNotes(); // 刷新列表
            }
          });
        });
      } catch (error) {
        notesListEl.innerHTML = "<li>加载笔记失败，请检查网络</li>";
        console.error(error);
      }
    }

    // 添加新笔记
    noteFormEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const content = document.getElementById("note-content").value;
      if (!content.trim()) return;

      try {
        await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues`, {
          method: "POST",
          headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: `Note: ${new Date().toLocaleDateString('zh-CN')}`,
            body: content,
            labels: ["note"]
          })
        });
        document.getElementById("note-content").value = "";
        fetchNotes(); // 刷新列表
        alert("笔记添加成功！");
      } catch (error) {
        alert("添加失败，请检查Token权限");
        console.error(error);
      }
    });

    // 页面加载时拉取笔记
    fetchNotes();
  </script>
</body>
</html>
